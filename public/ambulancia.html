<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AMBULINK | Ambulancia</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue-deep:    #0b1e3d;
      --blue-mid:     #0e2a52;
      --cyan:         #0aa0df;
      --red:          #e10600;
      --green:        #1bb14c;
      --white:        #ffffff;
      --muted:        rgba(255,255,255,0.4);
      --input-bg:     rgba(255,255,255,0.06);
      --input-border: rgba(255,255,255,0.11);
      --card-bg:      rgba(255,255,255,0.04);
      --card-border:  rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--blue-deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    /* ════════════════════════════
       TOPBAR
    ════════════════════════════ */
    .topbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 64px;
      background: var(--blue-mid);
      border-bottom: 1px solid var(--card-border);
      flex-shrink: 0;
    }

    .topbar-left { display: flex; align-items: center; gap: 20px; }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 5px;
      color: var(--white);
      line-height: 1;
      user-select: none;
    }
    .brand span { color: var(--red); }

    .sep { width: 1px; height: 32px; background: var(--card-border); }

    /* Estado badge */
    #estadoAmbulancia {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(225,6,0,0.12);
      color: #ff7070;
      border: 1px solid rgba(225,6,0,0.28);
      transition: all 0.4s;
    }
    #estadoAmbulancia::before {
      content: "";
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      flex-shrink: 0;
    }

    /* Monitorear */
    .btn-monitor {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: rgba(10,160,223,0.12);
      color: var(--cyan);
      border: 1px solid rgba(10,160,223,0.28);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .btn-monitor:hover { background: rgba(10,160,223,0.22); transform: translateY(-1px); }

    /* EN CAMINO — bold & glowing */
    #btnEnCamino {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 10px 22px;
      background: linear-gradient(135deg, #c80500 0%, #ff2a00 100%);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 4px 18px rgba(225,6,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    #btnEnCamino::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    #btnEnCamino:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(225,6,0,0.5); }
    #btnEnCamino:hover::after { transform: translateX(100%); }
    #btnEnCamino:active { transform: translateY(0); }

    .topbar-right { display: flex; align-items: center; }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 9px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 8px 16px;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
    }
    .user-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 7px var(--cyan); }

    /* ════════════════════════════
       LAYOUT
    ════════════════════════════ */
    .layout {
      position: relative;
      z-index: 1;
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 80px;
      background: var(--blue-mid);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 0;
      gap: 12px;
      flex-shrink: 0;
    }

    .nav-btn {
      width: 52px; height: 52px;
      border-radius: 14px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .nav-btn:hover { background: rgba(10,160,223,0.12); border-color: rgba(10,160,223,0.3); color: var(--cyan); }
    .nav-btn.danger:hover { background: rgba(225,6,0,0.12); border-color: rgba(225,6,0,0.3); color: #ff7070; }
    .nav-btn svg { width: 20px; height: 20px; }
    .sidebar-sep { width: 32px; height: 1px; background: var(--card-border); margin: 4px 0; }

    /* ── MAIN ── */
    .main {
      flex: 1;
      padding: 22px 26px 90px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 22px 26px 26px;
      animation: fadeUp 0.4s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SECTION HEADER ── */
    .sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .sec-accent { width: 4px; height: 20px; background: var(--cyan); border-radius: 2px; }
    .sec-head h3 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* ── GRIDS ── */
    .top-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .row-4   { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
    .row-3   { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }

    /* ── FIELD ── */
    .field { display: flex; flex-direction: column; gap: 8px; }

    .field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input,
    .field select {
      width: 100%;
      height: 42px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 9px;
      padding: 0 14px;
      color: var(--white);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .field input::placeholder { color: rgba(255,255,255,0.18); }
    .field input:focus,
    .field select:focus {
      border-color: var(--cyan);
      background: rgba(10,160,223,0.07);
      box-shadow: 0 0 0 3px rgba(10,160,223,0.1);
    }
    .field select option { background: #0e2a52; color: white; }

    /* voice states */
    .active-field    { border-color: #f59e0b !important; background: rgba(245,158,11,0.08) !important; box-shadow: 0 0 0 3px rgba(245,158,11,0.15) !important; }
    .confirmed-field { border-color: #1bb14c !important; background: rgba(27,177,76,0.07)  !important; box-shadow: 0 0 0 3px rgba(27,177,76,0.12)  !important; color: #5de98d !important; font-weight: 600; }

    /* ── GUARDAR — verde, grande ── */
    .actions { display: flex; justify-content: flex-end; margin-top: 22px; }

    .btn-save {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #1bb14c 0%, #15923f 100%);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 14px 36px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(27,177,76,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-save::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(27,177,76,0.45); }
    .btn-save:hover::after { transform: translateX(100%); }
    .btn-save:active { transform: translateY(0); }

    /* ════════════════════════════
       VOICE BUTTON — vistoso
    ════════════════════════════ */
    .btn-voz {
      position: fixed;
      bottom: 34px;
      right: 34px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      transition: all 0.3s;
      background: linear-gradient(135deg, #0e2a52 0%, #0b1e3d 100%);
      box-shadow:
        0 0 0 3px rgba(10,160,223,0.5),
        0 0 0 6px rgba(10,160,223,0.15),
        0 8px 28px rgba(0,0,0,0.5);
    }
    .btn-voz:hover {
      box-shadow: 0 0 0 4px rgba(10,160,223,0.7), 0 0 0 8px rgba(10,160,223,0.2), 0 10px 32px rgba(0,0,0,0.5);
      transform: scale(1.07);
    }
    .btn-voz.listening {
      background: linear-gradient(135deg, #c80500 0%, #ff2a00 100%);
      animation: mic-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%   { box-shadow: 0 0 0 4px rgba(225,6,0,0.6), 0 0 0 10px rgba(225,6,0,0.2), 0 8px 28px rgba(225,6,0,0.4); }
      50%  { box-shadow: 0 0 0 8px rgba(225,6,0,0.35), 0 0 0 18px rgba(225,6,0,0.08), 0 8px 28px rgba(225,6,0,0.4); }
      100% { box-shadow: 0 0 0 4px rgba(225,6,0,0.6), 0 0 0 10px rgba(225,6,0,0.2), 0 8px 28px rgba(225,6,0,0.4); }
    }

    /* ── STATUS VOZ ── */
    #status-voz {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      background: rgba(9,18,36,0.96);
      backdrop-filter: blur(10px);
      color: var(--cyan);
      padding: 5px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      z-index: 999;
      border-top: 1px solid rgba(10,160,223,0.2);
    }
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="brand">AMBU<span>LINK</span></div>
      <div class="sep"></div>
      <div id="estadoAmbulancia">DETENIDA</div>
      <div class="sep"></div>

      <button class="btn-monitor" onclick="irMonitoreo()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Monitorear Paciente
      </button>

      <button id="btnEnCamino" onclick="toggleEnCamino()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        En Camino
      </button>
    </div>

    <div class="topbar-right">
      <div class="user-chip">
        <div class="user-dot"></div>
        ambulancia1@gmail.com
      </div>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="nav-btn" onclick="location.href='historial.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Historial
      </button>
      <div class="sidebar-sep"></div>
      <button class="nav-btn danger" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Salir
      </button>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- Tripulación + Ubicación -->
      <div class="top-row">

        <div class="card">
          <div class="sec-head">
            <div class="sec-accent"></div>
            <h3>Tripulación</h3>
          </div>
          <div class="row-3">
            <div class="field">
              <label>Chofer</label>
              <select id="chofer"></select>
            </div>
            <div class="field">
              <label>Paramédico</label>
              <select id="paramedico"></select>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="sec-head">
            <div class="sec-accent"></div>
            <h3>Ubicación</h3>
          </div>
          <div class="field">
            <label>Dirección</label>
            <input id="ubicacion" placeholder="Dicta: Ubicación...">
          </div>
        </div>

      </div>

      <!-- Paciente -->
      <div class="card">
        <div class="sec-head">
          <div class="sec-accent"></div>
          <h3>Paciente</h3>
        </div>

        <div class="row-4">
          <div class="field">
            <label>Nombre</label>
            <input id="nombre" placeholder="Dicta: Nombre...">
          </div>
          <div class="field">
            <label>Carnet</label>
            <input id="carnet" placeholder="Dicta: Carnet...">
          </div>
          <div class="field">
            <label>Edad</label>
            <input id="edad" type="number" placeholder="0">
          </div>
          <div class="field">
            <label>Sexo</label>
            <select id="sexo">
              <option value="">Seleccionar</option>
              <option value="Masculino">Masculino</option>
              <option value="Femenino">Femenino</option>
            </select>
          </div>
        </div>

        <div class="row-3" style="margin-top:18px;">
          <div class="field">
            <label>Tipo de Sangre</label>
            <select id="tipo_sangre">
              <option value="">Seleccionar</option>
              <option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option>
              <option>O+</option><option>O-</option>
            </select>
          </div>
          <div class="field">
            <label>Tipo de Traslado</label>
            <select id="tipo_traslado">
              <option value="">Seleccionar</option>
              <option value="Emergencia">Emergencia</option>
              <option value="Alta">Alta</option>
              <option value="Traslado">Traslado</option>
            </select>
          </div>
          <div class="field">
            <label>Diagnóstico</label>
            <input id="diagnostico" placeholder="Dicta: Informe...">
          </div>
        </div>

        <div class="actions">
          <button class="btn-save" onclick="guardar()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Guardar Registro
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- VOICE BTN -->
  <button class="btn-voz" id="btnVoz" onclick="toggleVoz()">🎤</button>
  <div id="status-voz">Sistema de voz: standby</div>

  <script src="ambulancia.js"></script>
  <script src="guard.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      protegerPagina('ambulancia');
      cargarParamedicos();
    });
  </script>

</body>
</html>
