<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyecto | Login</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== MARCO AZUL CLARO ===== */
    .login-container {
      width: 50%;
      height: 90%;
      background: #0aa0df;
      border-radius: 16px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== CAJA BLANCA ===== */
    .login-container::before {
      content: "";
      position: absolute;
      inset: 30px;
      background: white;
      border-radius: 16px;
    }

    /* ===== CONTENIDO CENTRAL ===== */
    .login-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== TITULO ===== */
    .brand {
      color: #e10600;
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 25px;
      letter-spacing: 2px;
    }

    /* ===== BLOQUE AZUL OSCURO ===== */
    .form-box {
      background: #0b4aa6;
      width: 420px;
      padding: 45px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-box h2 {
      color: white;
      text-align: center;
      margin: 0 0 25px 0;
      letter-spacing: 1px;
    }

    .form-box label {
      color: white;
      font-size: 14px;
      margin-top: 10px;
    }

    /* ===== INPUTS CORREGIDOS ===== */
    .form-box input {
      padding: 12px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 14px;
      background: white;
      color: #111; /* 🔥 CLAVE */
    }

    .form-box input::placeholder {
      color: #888;
    }

    /* ===== BOTÓN PROFESIONAL ===== */
    .form-box button {
      margin-top: 25px;
      width: 130px;
      align-self: flex-end;
      padding: 10px;
      background: linear-gradient(135deg, #1566c0, #0aa0df);
      color: white;
      border: none;
      border-radius: 22px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .form-box button:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(10,160,223,0.4);
    }

    /* ===== MENSAJES ===== */
    .mensaje {
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }

    .mensaje.error {
      color: #ff6b6b;
    }

    .mensaje.ok {
      color: #4ade80;
    }

  </style>

</head>
<body>

  <div class="login-container">

    <div class="login-content">

      <div class="brand">AMBULINK</div>

      <div class="form-box">
        <h2>LOGIN</h2>

        <label>Email</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com">

        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••">

        <button onclick="login()">Iniciar sesión</button>

        <p id="mensaje" class="mensaje"></p>
      </div>

    </div>

  </div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- TU LOGIN (NO TOCADO) -->
  <script src="login.js"></script>

</body>
</html>
